<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Aircraft Merger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .file-input-wrapper {
            position: relative;
            margin-bottom: 30px;
        }
        
        .file-input-label {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }
        
        .file-input-label:hover {
            background: #5568d3;
        }
        
        #fileInput {
            display: none;
        }
        
        .file-list {
            margin-top: 20px;
        }
        
        .file-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        
        .file-item-name {
            color: #333;
            font-weight: 500;
        }
        
        .file-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-process {
            background: #667eea;
            color: white;
        }
        
        .btn-process:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-process:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-clear:hover {
            background: #e0e0e0;
        }
        
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .downloads {
            margin-top: 20px;
            display: none;
        }
        
        .downloads.show {
            display: block;
        }
        
        .download-item {
            padding: 12px;
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .download-link {
            color: #2e7d32;
            text-decoration: none;
            font-weight: 500;
            flex: 1;
        }
        
        .download-link:hover {
            text-decoration: underline;
        }
        
        .btn-download {
            background: #4caf50;
            color: white;
            padding: 6px 16px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .btn-download:hover {
            background: #45a049;
        }
        
        .info-box {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛩️ CSV Aircraft Merger</h1>
        <p class="subtitle">Merge multiple aircraft CSV files into two standard formats</p>
        
        <div class="info-box">
            <strong>Expected CSV columns:</strong> TIME, LAT, LONG, ALTITUDE, Aircraft, CALLSIGN<br>
            <strong>Output:</strong> Two merged CSV files with different formats
        </div>
        
        <div class="file-input-wrapper">
            <label class="file-input-label" for="fileInput">
                📁 Select CSV Files
            </label>
            <input type="file" id="fileInput" accept=".csv" multiple />
            <div class="file-list" id="fileList"></div>
        </div>
        
        <div class="buttons">
            <button class="btn-process" id="processBtn" disabled>Process Files</button>
            <button class="btn-clear" id="clearBtn">Clear</button>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="downloads" id="downloads"></div>
    </div>

    <script>
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const processBtn = document.getElementById('processBtn');
        const clearBtn = document.getElementById('clearBtn');
        const status = document.getElementById('status');
        const downloads = document.getElementById('downloads');
        
        let selectedFiles = [];
        
        fileInput.addEventListener('change', (e) => {
            selectedFiles = Array.from(e.target.files);
            validateFilesOnLoad();
            updateFileList();
        });
        
        processBtn.addEventListener('click', processFiles);
        clearBtn.addEventListener('click', clearAll);
        
        function extractIdFromFilename(fileName) {
            // Extract text between underscores if filename matches pattern Track_*_*
            // e.g., "Track_UA5307_unsmoothed" -> "UA5307"
            const match = fileName.match(/^Track_(.+?)_/);
            if (match) {
                return match[1];
            }
            // Otherwise, return filename without .csv extension
            return fileName.replace('.csv', '');
        }
        
        async function validateFilesOnLoad() {
            const REQUIRED_COLUMNS = ['TIME', 'LAT', 'LONG', 'CALLSIGN'];
            const issues = [];
            
            for (const file of selectedFiles) {
                try {
                    const text = await file.text();
                    const lines = text.trim().split('\n');
                    if (lines.length < 2) {
                        issues.push(`${file.name}: File is empty or has no data rows`);
                        continue;
                    }
                    
                    const header = lines[0].split(',').map(h => h.trim().toUpperCase());
                    const missingCols = REQUIRED_COLUMNS.filter(col => !header.includes(col));
                    
                    if (missingCols.length > 0) {
                        issues.push(`${file.name}: Missing columns: ${missingCols.join(', ')}`);
                    }
                } catch (error) {
                    issues.push(`${file.name}: Error reading file - ${error.message}`);
                }
            }
            
            if (issues.length > 0) {
                showStatus(`⚠️ Issues found:\n${issues.join('\n')}`, 'error');
            }
        }
        
        function updateFileList() {
            fileList.innerHTML = '';
            if (selectedFiles.length > 0) {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span class="file-item-name">Selected files:</span>
                    <span class="file-count">${selectedFiles.length} file${selectedFiles.length !== 1 ? 's' : ''}</span>
                `;
                fileList.appendChild(item);
                
                selectedFiles.forEach((file, index) => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `<span>${index + 1}. ${escapeHtml(file.name)}</span>`;
                    fileList.appendChild(item);
                });
                
                processBtn.disabled = false;
            } else {
                processBtn.disabled = true;
            }
        }
        
        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status show ${type}`;
        }
        
        async function processFiles() {
            try {
                showStatus('Processing files...', 'info');
                
                // Parse all CSV files
                const allRecords = [];
                const firstFileName = extractIdFromFilename(selectedFiles[0].name);
                
                for (const file of selectedFiles) {
                    const text = await file.text();
                    const records = parseCSV(text, file.name);
                    allRecords.push(...records);
                }
                
                if (allRecords.length === 0) {
                    showStatus('❌ No valid records found in the CSV files', 'error');
                    return;
                }
                
                // Generate both formats
                const format1CSV = generateFormat1(allRecords);
                const format2CSV = generateFormat2(allRecords);
                
                // Generate download links
                const format1Filename = `${firstFileName}-Aircraft.csv`;
                const format2Filename = `${firstFileName}-Maritime.csv`;
                
                generateDownloads(format1CSV, format1Filename, format2CSV, format2Filename);
                
                showStatus(`✅ Successfully processed ${allRecords.length} records from ${selectedFiles.length} file(s)`, 'success');
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
                console.error(error);
            }
        }
        
        function parseCSV(text, fileName) {
            const lines = text.trim().split('\n');
            if (lines.length < 2) return [];
            
            // Parse header
            const header = lines[0].split(',').map(h => h.trim().toUpperCase());
            
            // Find column indices
            const columnMap = {
                time: header.findIndex(h => h === 'TIME'),
                lat: header.findIndex(h => h === 'LAT'),
                lon: header.findIndex(h => h === 'LONG'),
                alt: header.findIndex(h => h === 'ALTITUDE'),
                aircraft: header.findIndex(h => h === 'AIRCRAFT'),
                callsign: header.findIndex(h => h === 'CALLSIGN')
            };
            
            // Validate required columns
            if (columnMap.time === -1 || columnMap.lat === -1 || columnMap.lon === -1 || columnMap.callsign === -1) {
                throw new Error(`Missing required columns in ${fileName}. Need: TIME, LAT, LONG, CALLSIGN`);
            }
            
            // Parse data
            const records = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                const values = parseCSVLine(line);
                
                records.push({
                    fileName: extractIdFromFilename(fileName),
                    time: values[columnMap.time],
                    lat: parseFloat(values[columnMap.lat]),
                    lon: parseFloat(values[columnMap.lon]),
                    alt: columnMap.alt !== -1 ? (values[columnMap.alt] ? parseFloat(values[columnMap.alt]) : 0) : 0,
                    aircraft: columnMap.aircraft !== -1 ? values[columnMap.aircraft] : '',
                    callsign: values[columnMap.callsign]
                });
            }
            
            return records;
        }
        
        function parseCSVLine(line) {
            const values = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    values.push(current.trim().replace(/^"|"$/g, ''));
                    current = '';
                } else {
                    current += char;
                }
            }
            
            values.push(current.trim().replace(/^"|"$/g, ''));
            return values;
        }
        
        function parseDateTime(timeStr) {
            try {
                // Handle ISO format: 2024-01-15T10:30:45.123Z or similar
                const date = new Date(timeStr);
                if (isNaN(date.getTime())) {
                    throw new Error('Invalid date');
                }
                return date;
            } catch (e) {
                console.warn(`Failed to parse time: ${timeStr}`);
                return null;
            }
        }
        
        function formatDateTimeWithFraction(date) {
            if (!date) return '';
            
            const year = date.getUTCFullYear();
            const month = String(date.getUTCMonth() + 1).padStart(2, '0');
            const day = String(date.getUTCDate()).padStart(2, '0');
            const hours = String(date.getUTCHours()).padStart(2, '0');
            const minutes = String(date.getUTCMinutes()).padStart(2, '0');
            const seconds = String(date.getUTCSeconds()).padStart(2, '0');
            const fraction = String(date.getUTCMilliseconds()).padStart(3, '0').slice(0, 2); // 2 digit fraction
            
            return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}.${fraction}`;
        }
        
        function formatDateTimeNoFraction(date) {
            if (!date) return '';
            
            const year = date.getUTCFullYear();
            const month = String(date.getUTCMonth() + 1).padStart(2, '0');
            const day = String(date.getUTCDate()).padStart(2, '0');
            const hours = String(date.getUTCHours()).padStart(2, '0');
            const minutes = String(date.getUTCMinutes()).padStart(2, '0');
            const seconds = String(date.getUTCSeconds()).padStart(2, '0');
            
            return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}`;
        }
        
        function generateFormat1(records) {
            // Format with fractions of seconds
            let csv = 'thresherId,dtg,lat,lon,alt,tailNumber\n';
            
            for (const record of records) {
                const date = parseDateTime(record.time);
                const dtg = formatDateTimeWithFraction(date);
                
                csv += `"${record.fileName}","${dtg}",${record.lat},${record.lon},${record.alt},"${record.callsign}"\n`;
            }
            
            return csv;
        }
        
        function generateFormat2(records) {
            // Format without fractions, no altitude
            let csv = 'track_Id,dtg,lat,lon,tailNumber\n';
            
            for (const record of records) {
                const date = parseDateTime(record.time);
                const dtg = formatDateTimeNoFraction(date);
                
                csv += `"${record.fileName}","${dtg}",${record.lat},${record.lon},"${record.callsign}"\n`;
            }
            
            return csv;
        }
        
        function createDownloadItem(blobUrl, filename) {
            const item = document.createElement('div');
            item.className = 'download-item';

            const label = document.createElement('span');
            label.className = 'download-link';
            label.textContent = '📊 ' + filename;
            item.appendChild(label);

            const btn = document.createElement('button');
            btn.className = 'btn-download';
            btn.textContent = 'Download';
            btn.addEventListener('click', () => downloadFile(blobUrl, filename));
            item.appendChild(btn);

            return item;
        }

        function generateDownloads(format1CSV, format1Filename, format2CSV, format2Filename) {
            downloads.innerHTML = '';

            const blob1 = new Blob([format1CSV], { type: 'text/csv' });
            const url1 = URL.createObjectURL(blob1);
            downloads.appendChild(createDownloadItem(url1, format1Filename));

            const blob2 = new Blob([format2CSV], { type: 'text/csv' });
            const url2 = URL.createObjectURL(blob2);
            downloads.appendChild(createDownloadItem(url2, format2Filename));

            downloads.classList.add('show');
        }
        
        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        function clearAll() {
            selectedFiles = [];
            fileInput.value = '';
            fileList.innerHTML = '';
            status.classList.remove('show');
            downloads.classList.remove('show');
            downloads.innerHTML = '';
            processBtn.disabled = true;
        }
    </script>
</body>
</html>
