<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #222;
      margin: 0;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 15px;
      color: #333;
    }
    .status-row {
      display: flex;
      align-items: center;
      margin: 6px 0;
      gap: 8px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }
    .label { color: #666; min-width: 90px; }
    .value { font-weight: 500; }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 6px 12px;
      font-size: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f8f8f8;
      cursor: pointer;
    }
    button:hover { background: #eee; }
    .info {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      font-size: 11px;
      color: #888;
    }
    .update-banner {
      margin-top: 8px;
      padding: 6px 8px;
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 4px;
      font-size: 11px;
      color: #92400e;
      display: none;
    }
    .activity {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #eee;
    }
    .activity h3 {
      margin: 0 0 6px 0;
      font-size: 12px;
      color: #666;
      font-weight: 600;
    }
    .current-cmd {
      padding: 5px 7px;
      background: #eff6ff;
      border: 1px solid #93c5fd;
      border-radius: 4px;
      font-size: 11px;
      color: #1e40af;
      margin-bottom: 6px;
      display: none;
    }
    .current-cmd .action { font-weight: 600; }
    .current-cmd .detail {
      display: block;
      color: #3b82f6;
      word-break: break-all;
      margin-top: 2px;
    }
    .current-cmd .elapsed {
      color: #6b7280;
      font-size: 10px;
    }
    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      font-size: 11px;
    }
    .history-list li {
      padding: 2px 0;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .history-list li:last-child { border-bottom: none; }
    .history-list .icon { flex-shrink: 0; font-size: 10px; }
    .history-list .action { color: #374151; font-weight: 500; }
    .history-list .detail {
      color: #9ca3af;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .history-list .dur { color: #9ca3af; flex-shrink: 0; font-size: 10px; }
    .history-list .routing { color: #6366f1; flex-shrink: 0; font-size: 9px; margin: 0 4px; }
  </style>
</head>
<body>
  <h2>SitrecBridge <span id="version" style="font-size: 11px; font-weight: normal; color: #888;"></span></h2>

  <div class="status-row">
    <div class="dot" id="ws-dot"></div>
    <span class="label">MCP Servers:</span>
    <span class="value" id="ws-status">Checking...</span>
  </div>
  <div id="ws-list" style="margin: 2px 0 0 18px; font-size: 11px; color: #555;"></div>

  <div class="status-row">
    <div class="dot" id="tab-dot"></div>
    <span class="label">Sitrec Tabs:</span>
    <span class="value" id="tab-status">Checking...</span>
  </div>
  <div id="tab-list" style="margin: 2px 0 0 18px; font-size: 11px; color: #555;"></div>

  <button id="reconnect-btn">Reconnect</button>

  <div class="update-banner" id="update-banner"></div>

  <div class="activity" id="activity">
    <h3>Activity</h3>
    <div class="current-cmd" id="current-cmd"></div>
    <ul class="history-list" id="history-list"></ul>
  </div>

  <div class="info" id="info"></div>

  <script src="popup.js"></script>
</body>
</html>
