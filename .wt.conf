# .wt.conf — Sitrec worktree configuration
# Used by the wt command (sitrec-tools/wt.sh + _wt).
# Machine-specific overrides can go in .wt.local.conf (sourced after this).

PROJECT_NAME="sitrec"
GITHUB_REPO="MickWest/Sitrec2"

# Shared directories (symlinked into worktrees to save space / build time)
SYMLINK_DIRS=("node_modules" "sitrecServer/vendor" "tools/SitrecBridge/node_modules")

# Gitignored config files (copied into each worktree)
COPY_FILES=("config/config.js" "config/config-install.js" "config/config.php" "config/shared.env" ".env" ".mcp.json")

# Build command
BUILD_CMD="npm run build"

# Local web server (set in .wt.local.conf if this machine differs)
BASE_URL="https://local.metabunk.org"
SITES_DIR="/Users/mick/Sites"

# MCP server process pattern for orphan cleanup
MCP_PATTERN="SitrecBridge/mcp-server.js"
