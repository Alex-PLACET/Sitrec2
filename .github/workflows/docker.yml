name: Docker Image

# Build and publish multi-arch Docker images to GitHub Container Registry.
# Triggers on version tags (e.g. 2.36.4) and can be run manually.
#
# Architecture: four-stage pipeline
#   1. "build-js" runs once on x86 — webpack produces identical output
#      regardless of CPU architecture, so no need to build twice.
#   2. "package" runs natively on both amd64 and arm64 runners,
#      copying the JS artifacts into the PHP+Apache runtime image.
#   3. "smoke-test" pulls the amd64 image, starts the container, and runs
#      HTTP checks + a Playwright visual regression test to verify it works.
#   4. "manifest" creates the multi-arch manifest list so a single
#      image tag works on both architectures (only if smoke tests pass).

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'    # matches tags like 12.19.0
  workflow_dispatch:               # manual trigger for testing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # lowercased in each job below

jobs:
  # ── Stage 1: Build JS artifacts (runs once on x86) ─────────────
  build-js:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0    # full clone so git describe works for version string

      - name: Copy example configs for clean build
        run: |
          cp config/config.js.example config/config.js
          cp config/shared.env.example config/shared.env
          cp config/config.php.example config/config.php
          # Write CI-specific config-install.js that outputs directly to dist/
          # (the example config uses a branch-based subdirectory like dist/sitrec/
          # which doesn't match what Dockerfile.release expects)
          cat > config/config-install.js << 'JSEOF'
          const path = require('path');
          module.exports = {
              dev_path: path.resolve(__dirname, '..', 'dist'),
              prod_path: path.resolve(__dirname, '..', 'dist'),
              buildFolder: '',
          };
          JSEOF

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Pin npm version to match local dev
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci || npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Build production bundle
        run: npx webpack --config webpack.prod.js
        env:
          DOCKER_BUILD: true

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Stage 2: Package into Docker images (native per-arch) ──────
  package:
    needs: build-js
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}

      - name: Build and push (single-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:build-${{ matrix.suffix }}-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max

  # ── Stage 3: Smoke-test the Docker image ──────────────────────────
  smoke-test:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6

      - name: Lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Docker container
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME_LC}:build-amd64-${GITHUB_SHA}"
          echo "Pulling ${IMAGE}"
          docker pull "${IMAGE}"
          docker run -d --name sitrec-smoke \
            -p 8080:80 \
            -e NO_TERRAIN=true \
            "${IMAGE}"

      - name: Wait for container to respond
        run: |
          echo "Waiting for HTTP 200 from container..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Container is ready (attempt ${i})"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Container failed to respond after 60s"
          docker logs sitrec-smoke
          exit 1

      - name: HTTP smoke tests
        run: |
          BODY=$(curl -sf http://localhost:8080/)

          # Verify entrypoint injected runtime env vars into HTML
          echo "$BODY" | grep -q '__SITREC_ENV__' \
            && echo "✓ Runtime env injection present" \
            || { echo "✗ Missing __SITREC_ENV__ in HTML"; exit 1; }

          # Verify webpack output (script bundles present)
          echo "$BODY" | grep -q '<script' \
            && echo "✓ Script tags present" \
            || { echo "✗ Missing script tags in HTML"; exit 1; }

          echo "All HTTP smoke tests passed"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Pin npm version to match local dev
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci || npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke test
        run: npx playwright test --config=playwright.docker.config.js
        env:
          DOCKER_SMOKE_URL: http://localhost:8080

      - name: Upload smoke test snapshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-smoke-snapshots
          path: |
            tests_regression/docker-smoke.test.js-snapshots/
            test-results/
          retention-days: 7

      - name: Show container logs on failure
        if: failure()
        run: docker logs sitrec-smoke

      - name: Cleanup
        if: always()
        run: docker rm -f sitrec-smoke || true

  # ── Stage 4: Create multi-arch manifest ─────────────────────────
  manifest:
    needs: [package, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        run: |
          SOURCE_AMD64="${REGISTRY}/${IMAGE_NAME_LC}:build-amd64-${GITHUB_SHA}"
          SOURCE_ARM64="${REGISTRY}/${IMAGE_NAME_LC}:build-arm64-${GITHUB_SHA}"

          # Create a manifest for each target tag (e.g. 2.36.4, latest)
          echo '${{ steps.meta.outputs.tags }}' | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Creating manifest for: $tag"
            docker buildx imagetools create \
              --tag "${tag}" \
              "${SOURCE_AMD64}" \
              "${SOURCE_ARM64}"
          done

      - name: Clean up per-arch build tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="${IMAGE_NAME_LC##*/}"
          for SUFFIX in amd64 arm64; do
            TAG="build-${SUFFIX}-${GITHUB_SHA}"
            echo "Deleting tag: ${TAG}"
            # Find the version ID for this tag
            VID=$(gh api "/user/packages/container/${PKG}/versions" \
              --paginate --jq ".[] | select(.metadata.container.tags[] == \"${TAG}\") | .id")
            if [ -n "$VID" ]; then
              gh api --method DELETE "/user/packages/container/${PKG}/versions/${VID}"
              echo "Deleted version ${VID} (${TAG})"
            else
              echo "Warning: could not find version for tag ${TAG}"
            fi
          done
