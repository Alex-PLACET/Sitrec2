name: Docker Image

# Build and publish multi-arch Docker images to GitHub Container Registry.
# Triggers on version tags (e.g. 12.19.0) and can be run manually.
#
# Architecture: two-stage pipeline
#   1. "build-js" runs once on x86 — webpack produces identical output
#      regardless of CPU architecture, so no need to build twice.
#   2. "package" runs natively on both amd64 and arm64 runners,
#      copying the JS artifacts into the PHP+Apache runtime image.
#   3. "manifest" creates the multi-arch manifest list so a single
#      image tag works on both architectures.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'    # matches tags like 12.19.0
  workflow_dispatch:               # manual trigger for testing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # lowercased in each job below

jobs:
  # ── Stage 1: Build JS artifacts (runs once on x86) ─────────────
  build-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full clone so git describe works for version string

      - name: Copy example configs for clean build
        run: |
          cp config/config.js.example config/config.js
          cp config/config-install.js.example config/config-install.js
          cp config/shared.env.example config/shared.env
          cp config/config.php.example config/config.php

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Build production bundle
        run: npx webpack --config webpack.prod.js
        env:
          DOCKER_BUILD: true

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Stage 2: Package into Docker images (native per-arch) ──────
  package:
    needs: build-js
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}

      - name: Build and push (single-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.release
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:build-${{ matrix.suffix }}-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max

  # ── Stage 3: Create multi-arch manifest ─────────────────────────
  manifest:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifest
        run: |
          SOURCE_AMD64="${REGISTRY}/${IMAGE_NAME_LC}:build-amd64-${GITHUB_SHA}"
          SOURCE_ARM64="${REGISTRY}/${IMAGE_NAME_LC}:build-arm64-${GITHUB_SHA}"

          # Create a manifest for each target tag (e.g. 12.20.0, latest)
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker buildx imagetools create \
              --tag "${tag}" \
              "${SOURCE_AMD64}" \
              "${SOURCE_ARM64}"
          done

      - name: Clean up build tags
        run: |
          # The per-arch build tags are no longer needed
          # They'll expire naturally, but we can delete them via the API
          echo "Per-arch images pushed. Manifest tags created."
